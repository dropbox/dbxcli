name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      asset_version: ${{ steps.version.outputs.asset_version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: Set release version
        id: version
        shell: bash
        run: echo "asset_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
      - run: mkdir -p dist
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/dbxcli_${{ steps.version.outputs.asset_version }}_sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - run: ./build.sh
        env:
          VERSION: ${{ github.ref_name }}
      - run: ./packaging/package-release.sh
        env:
          VERSION: ${{ github.ref_name }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Sign checksums
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.sigstore.json dist/SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json
            dist/*_sbom.spdx.json
