name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
      - run: ./build.sh
        env:
          VERSION: ${{ github.ref_name }}
      - run: ./packaging/package-release.sh
        env:
          VERSION: ${{ github.ref_name }}
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
