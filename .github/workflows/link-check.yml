name: Link Check

on:
  schedule:
    - cron: "23 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Markdown links
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude "https://github.com/dropbox/dbxcli/releases/download/vX.Y.Z/.*"
            README.md
            "docs/**/*.md"
